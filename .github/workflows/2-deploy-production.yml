name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: node:20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Salesforce (JWT)
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          sf org login jwt \
            --client-id ${{ secrets.SF_CLIENT_ID }} \
            --jwt-key-file server.key \
            --username ${{ secrets.SF_USERNAME }} \
            --instance-url ${{ secrets.SF_INSTANCE_URL }} \
            --alias prod-org
          rm server.key

      - name: Deploy to Production
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org prod-org \
            --test-level RunLocalTests \
            --wait 30

      - name: Notify Slack Middleware (success)
        if: success()
        env:
          MIDDLEWARE_URL: ${{ secrets.SLACK_MIDDLEWARE_URL }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          curl -X POST "${MIDDLEWARE_URL}/notify/autonomous" \
            -H "Content-Type: application/json" \
            -d "{\"status\": \"success\", \"commit\": \"${COMMIT_SHA}\", \"actor\": \"${ACTOR}\"}"

      - name: Notify Slack Middleware (failure)
        if: failure()
        env:
          MIDDLEWARE_URL: ${{ secrets.SLACK_MIDDLEWARE_URL }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          curl -X POST "${MIDDLEWARE_URL}/notify/autonomous" \
            -H "Content-Type: application/json" \
            -d "{\"status\": \"failure\", \"commit\": \"${COMMIT_SHA}\", \"actor\": \"${ACTOR}\"}"
