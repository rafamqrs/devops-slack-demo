name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: node:20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Salesforce (Auth URL)
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "${SFDX_AUTH_URL}" > auth-url.txt
          sf org login sfdx-url --sfdx-url-file auth-url.txt --alias prod-org
          rm auth-url.txt

      - name: Deploy to Production
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org prod-org \
            --test-level RunLocalTests \
            --wait 30

      - name: Notify Slack Middleware (success)
        if: success()
        env:
          MIDDLEWARE_URL: ${{ secrets.SLACK_MIDDLEWARE_URL }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          curl -X POST "${MIDDLEWARE_URL}/notify/autonomous" \
            -H "Content-Type: application/json" \
            -d "{\"status\": \"success\", \"commit\": \"${COMMIT_SHA}\", \"actor\": \"${ACTOR}\"}"

      - name: Notify Slack Middleware (failure)
        if: failure()
        env:
          MIDDLEWARE_URL: ${{ secrets.SLACK_MIDDLEWARE_URL }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          curl -X POST "${MIDDLEWARE_URL}/notify/autonomous" \
            -H "Content-Type: application/json" \
            -d "{\"status\": \"failure\", \"commit\": \"${COMMIT_SHA}\", \"actor\": \"${ACTOR}\"}"
