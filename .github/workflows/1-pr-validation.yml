name: PR Validation - Salesforce

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    container:
      image: node:20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Salesforce (JWT)
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          sf org login jwt \
            --client-id ${{ secrets.SF_CLIENT_ID }} \
            --jwt-key-file server.key \
            --username ${{ secrets.SF_USERNAME }} \
            --instance-url ${{ secrets.SF_INSTANCE_URL }} \
            --alias prod-org
          rm server.key

      - name: Validate deployment (dry-run)
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org prod-org \
            --test-level RunLocalTests \
            --dry-run \
            --wait 30

      - name: Post validation result
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "✅ Validation complete for PR #${PR_NUMBER}"
