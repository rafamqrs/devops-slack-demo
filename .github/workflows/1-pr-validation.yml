name: PR Validation - Salesforce

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    container:
      image: node:20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Salesforce (Auth URL)
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "${SFDX_AUTH_URL}" > auth-url.txt
          sf org login sfdx-url --sfdx-url-file auth-url.txt --alias prod-org
          rm auth-url.txt

      - name: Validate deployment (dry-run)
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org prod-org \
            --test-level RunLocalTests \
            --dry-run \
            --wait 30

      - name: Post validation result
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "✅ Validation complete for PR #${PR_NUMBER}"
